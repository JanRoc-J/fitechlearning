    chinese_font: "SimHei"                        # 中文字体
    dpi: 120

# =============================================================================
# 质量检查
# =============================================================================
quality_check:
  rsi_range: [0, 100]                             # RSI 必须在 [0,100]
  atr_positive: true                               # ATR 必须 > 0
  boll_lower_lt_upper: true                        # LOWER <= MID <= UPPER
  macd_bar_sign_check: true                        # BAR 符号 = DIF-DEA 符号
