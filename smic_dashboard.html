const kChart = echarts.init(document.getElementById('kChart'));
const vChart = echarts.init(document.getElementById('vChart'));

// Common color
const upColor = '#ff4d4f';
const downColor = '#52c41a';

function buildKOption(dataSlice) {
    return {
        tooltip: {
            trigger: 'axis',
            axisPointer: { type: 'cross' },
            backgroundColor: 'rgba(255,255,255,0.95)',
            borderColor: '#e8e8e8',
            textStyle: { color: '#333' },
            formatter: function(params) {
                const d = params[0];
                if (!d) return '';
                const vals = d.data;
                const change = vals[2] - vals[1];
                const pct = ((change / vals[1]) * 100).toFixed(2);
                const sign = change >= 0 ? '+' : '';
                return `
                    <div style="font-weight:700;margin-bottom:4px;">${d.axisValue}</div>
                    <div>开盘：<b>${vals[1].toFixed(2)}</b></div>
                    <div>收盘：<b style="color:${change >= 0 ? upColor : downColor}">${vals[2].toFixed(2)}</b></div>
                    <div>最高：<b>${vals[4].toFixed(2)}</b></div>
                    <div>最低：<b>${vals[3].toFixed(2)}</b></div>
                    <div>涨跌：<b style="color:${change >= 0 ? upColor : downColor}">${sign}${change.toFixed(2)} (${sign}${pct}%)</b></div>
                `;
            }
        },
        grid: { left: '8%', right: '3%', top: 20, bottom: 40 },
        xAxis: {
            type: 'category',
            data: dataSlice.map(d => d.date),
            axisLine: { lineStyle: { color: '#d9d9d9' } },
            axisLabel: { color: '#666', fontSize: 11 },
            boundaryGap: true,
            axisTick: { show: false }
        },
        yAxis: {
            type: 'value',
            scale: true,
            splitLine: { lineStyle: { color: '#f0f0f0' } },
            axisLabel: { color: '#666', fontSize: 11, formatter: '¥{value}' }
        },
        dataZoom: [
            { type: 'inside', start: 0, end: 100 },
            { type: 'slider', start: 0, end: 100, height: 24, bottom: 8,
              borderColor: '#e8e8e8', backgroundColor: '#fafafa',
              fillerColor: 'rgba(22,119,255,0.1)',
              handleStyle: { color: '#1677ff' },
              textStyle: { fontSize: 10 }
            }
        ],
        series: [{
            type: 'candlestick',
            data: dataSlice.map(d => [d.open, d.close, d.low, d.high]),
            itemStyle: {
                color: upColor,
                color0: downColor,
                borderColor: upColor,
                borderColor0: downColor
            },
            markLine: {
                silent: true,
                symbol: 'none',
                data: [
                    { yAxis: dataSlice[0].close, lineStyle: { color: '#1677ff', type: 'dashed', width: 1, opacity: 0.6 } }
                ],
                label: { show: false }
            }
        }]
    };
}

function buildVOption(dataSlice) {
    return {
        tooltip: {
            trigger: 'axis',
            axisPointer: { type: 'shadow' },
            backgroundColor: 'rgba(255,255,255,0.95)',
            borderColor: '#e8e8e8',
            textStyle: { color: '#333' },
            formatter: function(params) {
                const d = params[0];
                return `<div style="font-weight:700;margin-bottom:4px;">${d.axisValue}</div><div>成交量：<b>${(d.value / 10000).toFixed(0)}万</b></div>`;
            }
        },
        grid: { left: '8%', right: '3%', top: 10, bottom: 30 },
        xAxis: {
            type: 'category',
            data: dataSlice.map(d => d.date),
            axisLine: { lineStyle: { color: '#d9d9d9' } },
            axisLabel: { color: '#666', fontSize: 10 },
            axisTick: { show: false }
        },
        yAxis: {
            type: 'value',
            axisLabel: { color: '#666', fontSize: 10, formatter: v => (v / 10000).toFixed(0) + '万' },
            splitLine: { lineStyle: { color: '#f0f0f0' } }
        },
        dataZoom: [
            { type: 'inside', start: 0, end: 100 },
            { type: 'slider', start: 0, end: 100, height: 20, bottom: 4,
              borderColor: '#e8e8e8', backgroundColor: '#fafafa',
              fillerColor: 'rgba(22,119,255,0.1)',
              handleStyle: { color: '#1677ff' },
              textStyle: { fontSize: 10 }
            }
        ],
        series: [{
            type: 'bar',
            data: dataSlice.map((d, i) => {
                const isRise = d.close >= d.open;
                return { value: d.vol, itemStyle: { color: isRise ? upColor : downColor, opacity: 0.6 } };
            }),
            emphasis: {
                itemStyle: { opacity: 1 }
            }
        }]
    };
}

// Initial render
kChart.setOption(buildKOption(rawData));
vChart.setOption(buildVOption(rawData));

// Range selector
function createRangeButtons(containerId, chart, buildFn, allData) {
    const ranges = [
        { label: '近1月', days: 22 },
        { label: '近3月', days: 66 },
        { label: '近6月', days: 132 },
        { label: '近1年', days: 250 },
        { label: '全部', days: 9999 }
    ];
    const container = document.getElementById(containerId);
    ranges.forEach((r, idx) => {
        const btn = document.createElement('button');
        btn.textContent = r.label;
        btn.className = idx === ranges.length - 1 ? 'active' : '';
        btn.onclick = function() {
            container.querySelectorAll('button').forEach(b => b.className = '');
            btn.className = 'active';
            const slice = r.days >= allData.length ? allData : allData.slice(-r.days);
            chart.setOption(buildFn(slice));
        };
        container.appendChild(btn);
    });
}

createRangeButtons('kRangeSelector', kChart, buildKOption, rawData);
createRangeButtons('vRangeSelector', vChart, buildVOption, rawData);

// Responsive
window.addEventListener('resize', () => { kChart.resize(); vChart.resize(); });
</script>
